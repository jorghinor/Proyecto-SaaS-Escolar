#version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: saas_user
      POSTGRES_PASSWORD: saas_password
      POSTGRES_DB: saas_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3003:3000"
    environment:
      DB_HOST: db
      DB_USER: saas_user
      DB_PASS: saas_password
      DB_NAME: saas_db
      JWT_SECRET: supersecret_saas_key
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "8080:80"

volumes:
  postgres_data:
